<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ENGAGEDLOOP Icon Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #e5e5e5;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      padding: 40px;
      min-height: 100vh;
    }
    
    h1 {
      color: #f97316;
      font-size: 18px;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 30px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .upload-section {
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 30px;
      margin-bottom: 30px;
    }
    
    .upload-label {
      color: #f97316;
      font-size: 11px;
      margin-bottom: 10px;
      display: block;
    }
    
    input[type="file"] {
      background: #000;
      border: 1px solid #333;
      color: #e5e5e5;
      padding: 10px;
      font-family: inherit;
      font-size: 11px;
      width: 100%;
    }
    
    .sizes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    
    .size-card {
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 20px;
      text-align: center;
    }
    
    .size-label {
      color: #666;
      font-size: 10px;
      margin-bottom: 10px;
    }
    
    .size-px {
      color: #f97316;
      font-size: 14px;
      margin-bottom: 15px;
    }
    
    canvas {
      border: 1px solid #333;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      margin-bottom: 15px;
      background: #000;
    }
    
    .download-btn {
      background: #000;
      border: 1px solid #f97316;
      color: #f97316;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    
    .download-btn:hover {
      background: #f97316;
      color: #000;
    }
    
    .status {
      color: #666;
      font-size: 11px;
      margin-top: 20px;
      padding: 10px;
      background: #0a0a0a;
      border-left: 2px solid #f97316;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>// ICON_GENERATOR_v1.0</h1>
    <div class="subtitle">Generate required icon sizes for Chrome Extension</div>
    
    <div class="upload-section">
      <label class="upload-label">UPLOAD_SOURCE_IMAGE //</label>
      <input type="file" id="imageInput" accept="image/*">
      <div class="status" id="status">Waiting for image upload...</div>
    </div>
    
    <div class="sizes-grid" id="sizesGrid">
      <!-- Generated icons will appear here -->
    </div>
  </div>

  <script>
    const requiredSizes = [16, 32, 48, 128];
    const imageInput = document.getElementById('imageInput');
    const sizesGrid = document.getElementById('sizesGrid');
    const status = document.getElementById('status');
    
    imageInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          generateIcons(img);
          status.textContent = `✓ Source loaded: ${img.width}x${img.height}px // Generating ${requiredSizes.length} icon sizes...`;
          status.style.borderLeftColor = '#22c55e';
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
    
    function generateIcons(sourceImg) {
      sizesGrid.innerHTML = '';
      
      requiredSizes.forEach(size => {
        const card = document.createElement('div');
        card.className = 'size-card';
        
        const label = document.createElement('div');
        label.className = 'size-label';
        label.textContent = 'ICON_SIZE';
        
        const px = document.createElement('div');
        px.className = 'size-px';
        px.textContent = `${size}×${size}px`;
        
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        canvas.style.width = size >= 48 ? '64px' : `${size}px`;
        canvas.style.height = size >= 48 ? '64px' : `${size}px`;
        
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        // Center and fit image
        const scale = Math.min(size / sourceImg.width, size / sourceImg.height);
        const x = (size - sourceImg.width * scale) / 2;
        const y = (size - sourceImg.height * scale) / 2;
        
        ctx.drawImage(sourceImg, x, y, sourceImg.width * scale, sourceImg.height * scale);
        
        const downloadBtn = document.createElement('a');
        downloadBtn.className = 'download-btn';
        downloadBtn.textContent = `[DOWNLOAD_${size}]`;
        downloadBtn.download = `icon${size}.png`;
        downloadBtn.href = canvas.toDataURL('image/png');
        
        card.appendChild(label);
        card.appendChild(px);
        card.appendChild(canvas);
        card.appendChild(downloadBtn);
        sizesGrid.appendChild(card);
      });
      
      status.innerHTML = `✓✓✓ All icons generated! // Download each size and replace in <strong>icons/</strong> folder`;
    }
  </script>
</body>
</html>
