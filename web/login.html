<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGIN // ENGAGEDLOOP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .header {
      padding: 20px 40px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 18px;
      font-weight: 600;
      color: #f97316;
      letter-spacing: 2px;
    }
    
    .back-link {
      color: #666;
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s;
    }
    
    .back-link:hover {
      color: #f97316;
    }
    
    /* Main Container */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      border: 1px solid #333;
      background: #111;
    }
    
    .login-header {
      padding: 30px;
      border-bottom: 1px solid #222;
      text-align: center;
    }
    
    .login-title {
      font-size: 14px;
      color: #f97316;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      font-size: 11px;
      color: #666;
    }
    
    .login-body {
      padding: 30px;
    }
    
    /* Form Elements */
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid #333;
      color: #e5e5e5;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .form-input:focus {
      border-color: #f97316;
    }
    
    .form-input::placeholder {
      color: #444;
    }
    
    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #f97316;
      border: none;
      color: #000;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary:hover {
      background: #ea580c;
    }
    
    .btn-primary:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    
    .btn-google {
      width: 100%;
      padding: 14px;
      background: #000;
      border: 1px solid #444;
      color: #e5e5e5;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }
    
    .btn-google:hover {
      border-color: #f97316;
    }
    
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #444;
      font-size: 11px;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }
    
    .divider span {
      padding: 0 16px;
    }
    
    /* Toggle Links */
    .toggle-section {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #222;
    }
    
    .toggle-text {
      font-size: 12px;
      color: #666;
    }
    
    .toggle-link {
      color: #f97316;
      text-decoration: none;
      cursor: pointer;
    }
    
    .toggle-link:hover {
      text-decoration: underline;
    }
    
    /* Messages */
    .message {
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 12px;
      display: none;
    }
    
    .message.error {
      display: block;
      background: #1a0505;
      border: 1px solid #441111;
      color: #ef4444;
    }
    
    .message.success {
      display: block;
      background: #051a05;
      border: 1px solid #114411;
      color: #22c55e;
    }
    
    .message.info {
      display: block;
      background: #0a1a2e;
      border: 1px solid #1a3a5e;
      color: #3b82f6;
    }
    
    /* Footer */
    .footer {
      padding: 20px;
      text-align: center;
      border-top: 1px solid #222;
    }
    
    .footer-text {
      font-size: 11px;
      color: #444;
    }
    
    /* Loading State */
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Password Strength */
    .password-strength {
      height: 3px;
      background: #222;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .password-strength-bar {
      height: 100%;
      width: 0;
      transition: all 0.3s;
    }
    
    .strength-weak { background: #ef4444; width: 33%; }
    .strength-medium { background: #f97316; width: 66%; }
    .strength-strong { background: #22c55e; width: 100%; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">[ENGAGEDLOOP]</div>
    <a href="index.html" class="back-link">← BACK_TO_HOME</a>
  </header>

  <main class="main">
    <div class="login-container">
      <div class="login-header">
        <div class="login-title">// AUTHENTICATION //</div>
        <div class="login-subtitle" id="modeSubtitle">Sign in to sync across devices</div>
      </div>
      
      <div class="login-body">
        <div id="message" class="message"></div>
        
        <!-- Login Form -->
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="you@example.com"
              required
            >
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="••••••••"
              required
            >
            <div class="password-strength" id="passwordStrength" style="display: none;">
              <div class="password-strength-bar" id="strengthBar"></div>
            </div>
          </div>
          
          <button type="submit" class="btn-primary" id="submitBtn">
            [SIGN_IN]
          </button>
        </form>
        
        <div class="divider">
          <span>OR</span>
        </div>
        
        <button class="btn-google" id="googleBtn">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
        
        <div class="toggle-section">
          <span class="toggle-text">
            <span id="toggleText">Don't have an account?</span>
            <span class="toggle-link" id="toggleLink">Sign up</span>
          </span>
        </div>
      </div>
      
      <div class="footer">
        <div class="footer-text">// SECURE_AUTH // SUPABASE // ENCRYPTED</div>
      </div>
    </div>
  </main>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  
  <script>
    // Supabase Config
    const SUPABASE_URL = 'https://ioyqxwmgfdqzokwqpgdv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_XCn2apCq33VxNF8yXv82MA_L9Pg9ntG';
    
    let supabase;
    let isSignUp = false;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      
      // Check if already logged in
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = 'dashboard.html';
        return;
      }
      
      setupEventListeners();
    });
    
    function setupEventListeners() {
      // Form submit
      document.getElementById('loginForm').addEventListener('submit', handleAuth);
      
      // Google sign in
      document.getElementById('googleBtn').addEventListener('click', signInWithGoogle);
      
      // Toggle signup/signin
      document.getElementById('toggleLink').addEventListener('click', toggleMode);
      
      // Password strength (only in signup mode)
      document.getElementById('password').addEventListener('input', checkPasswordStrength);
    }
    
    async function handleAuth(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      
      btn.disabled = true;
      btn.innerHTML = isSignUp ? '[CREATING_ACCOUNT...]' : '[SIGNING_IN...]';
      
      try {
        let result;
        
        if (isSignUp) {
          // Sign up
          result = await supabase.auth.signUp({
            email,
            password,
            options: {
              emailRedirectTo: window.location.origin + '/dashboard.html'
            }
          });
          
          if (result.error) throw result.error;
          
          // Create profile
          await supabase.from('profiles').insert({
            id: result.data.user.id,
            email: email,
            is_pro: false,
            created_at: new Date().toISOString()
          });
          
          showMessage('success', 'Account created! Check your email to confirm.');
        } else {
          // Sign in
          result = await supabase.auth.signInWithPassword({
            email,
            password
          });
          
          if (result.error) throw result.error;
          
          // Redirect to dashboard
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        showMessage('error', err.message || 'Authentication failed');
        btn.disabled = false;
        btn.innerHTML = isSignUp ? '[SIGN_UP]' : '[SIGN_IN]';
      }
    }
    
    async function signInWithGoogle() {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Connecting...';
      
      try {
        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/dashboard.html'
          }
        });
        
        if (error) throw error;
        
        // Redirect happens automatically
      } catch (err) {
        showMessage('error', err.message || 'Google sign in failed');
        btn.disabled = false;
        btn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        `;
      }
    }
    
    function toggleMode() {
      isSignUp = !isSignUp;
      
      const subtitle = document.getElementById('modeSubtitle');
      const toggleText = document.getElementById('toggleText');
      const toggleLink = document.getElementById('toggleLink');
      const submitBtn = document.getElementById('submitBtn');
      const passwordStrength = document.getElementById('passwordStrength');
      
      if (isSignUp) {
        subtitle.textContent = 'Create account to sync across devices';
        toggleText.textContent = 'Already have an account?';
        toggleLink.textContent = 'Sign in';
        submitBtn.textContent = '[SIGN_UP]';
        passwordStrength.style.display = 'block';
      } else {
        subtitle.textContent = 'Sign in to sync across devices';
        toggleText.textContent = "Don't have an account?";
        toggleLink.textContent = 'Sign up';
        submitBtn.textContent = '[SIGN_IN]';
        passwordStrength.style.display = 'none';
      }
      
      hideMessage();
    }
    
    function checkPasswordStrength() {
      if (!isSignUp) return;
      
      const password = document.getElementById('password').value;
      const bar = document.getElementById('strengthBar');
      
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
      if (password.match(/[0-9]/)) strength++;
      if (password.match(/[^a-zA-Z0-9]/)) strength++;
      
      bar.className = 'password-strength-bar';
      if (strength <= 1) bar.classList.add('strength-weak');
      else if (strength <= 2) bar.classList.add('strength-medium');
      else bar.classList.add('strength-strong');
    }
    
    function showMessage(type, text) {
      const msg = document.getElementById('message');
      msg.className = `message ${type}`;
      msg.textContent = text;
    }
    
    function hideMessage() {
      const msg = document.getElementById('message');
      msg.className = 'message';
      msg.textContent = '';
    }
  </script>
</body>
</html>
